apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postsync-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AbirRahaman/argocd-hooks-proj.git
    path: .
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
