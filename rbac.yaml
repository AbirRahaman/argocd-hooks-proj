apiVersion: v1
kind: ServiceAccount
metadata:
  name: compliance-checker
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: policyreport-writer
  namespace: default
rules:
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: compliance-checker-policyreport
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: policyreport-writer
subjects:
  - kind: ServiceAccount
    name: compliance-checker
    namespace: default
